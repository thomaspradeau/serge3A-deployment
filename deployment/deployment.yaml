apiVersion: apps/v1
kind: Deployment
metadata:
  name: serge3a
  namespace: user-tpradeau
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serge3a
  template:
    metadata:
      labels:
        app: serge3a
    spec:
      # J'ai supprimé ici le securityContext (runAsNonRoot et runAsUser)
      containers:
      - name: serge3a
        image: tpradeau/serge3a:0f8372b4ccc223e68f2d5d0e9b1e8502c99f5590
        imagePullPolicy: Always
        ports:
        - containerPort: 5003
        env:
        - name: TOKEN_IDFM
          valueFrom:
            secretKeyRef:
              name: idfm-secret
              key: token
        - name: UV_CACHE_DIR      
          value: "/tmp/.uv_cache" 
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 5003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 5003
          initialDelaySeconds: 20
          periodSeconds: 5
          